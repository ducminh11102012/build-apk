name: Build APK from ZIP (FIXED)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip

      - name: Download ZIP
        run: |
          wget -O source.zip https://github.com/ducminh11102012/build-apk/releases/download/1/pureread-lite.zip

      - name: Unzip project
        run: |
          unzip source.zip -d src
          echo "=== TREE ==="
          ls -R src

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Find Gradle wrapper
        run: |
          GRADLEW_PATH=$(find src -name gradlew | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew not found!"
            exit 1
          fi

          echo "Found gradlew: $GRADLEW_PATH"

          chmod +x "$GRADLEW_PATH"
          echo "$GRADLEW_PATH" > gradle_path.txt

      - name: Build APK
        run: |
          GRADLEW_PATH=$(cat gradle_path.txt)
          DIR=$(dirname "$GRADLEW_PATH")

          echo "Building in: $DIR"

          cd "$DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            src/**/build/outputs/apk/debug/*.apk
