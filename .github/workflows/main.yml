name: Build APK (Correct App Module)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip gradle

      - name: Download ZIP
        run: |
          wget -O source.zip https://github.com/ducminh11102012/build-apk/releases/download/1/pureread-lite.zip

      - name: Unzip
        run: |
          unzip source.zip -d src
          ls -R src

      - name: Find app module
        run: |
          APP_DIR=$(find src -path "*/app/build.gradle.kts" -exec dirname {} \; | head -n 1)

          if [ -z "$APP_DIR" ]; then
            echo "ERROR: app module not found!"
            exit 1
          fi

          echo "APP_DIR=$APP_DIR" > env.txt
          echo "Found app module: $APP_DIR"

      - name: Build APK
        run: |
          source env.txt
          cd "$APP_DIR"

          echo "Building in: $APP_DIR"

          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            src/**/app/build/outputs/apk/debug/*.apk
